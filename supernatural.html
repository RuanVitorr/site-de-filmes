    <script>
  document.addEventListener('keydown', function(event) {
    const focused = document.activeElement;

    if (event.code === 'Space') {
      // evita scroll
      event.preventDefault();

      // se for link ou botão, dispara ação
      if (focused.tagName === 'A' || focused.tagName === 'BUTTON') {
        focused.click();
      }
    }
  });
</script>
